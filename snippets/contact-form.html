<!--
  Form.taxi – Contact Form Snippet
  =================================
  A standard contact form with name, email, and message fields.
  Submits data to your Form.taxi endpoint via POST.

  Setup:
  1. Replace the action URL with your Form.taxi endpoint URL
  2. Adjust the _redirect URL to your thank-you page
  3. Style the form to match your site's design

  Docs: https://docs.form.taxi
-->

<form action="https://form.taxi/s/FORM_CODE" method="POST">

  <!-- Spam protection: honeypot field. Keep this hidden. -->
  <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">

  <!-- Optional: redirect after successful submission -->
  <input type="hidden" name="_redirect" value="https://yoursite.com/thank-you">

  <div>
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required>
  </div>

  <div>
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>
  </div>

  <div>
    <label for="message">Message</label>
    <textarea id="message" name="message" rows="5" required></textarea>
  </div>

  <button type="submit">Send Message</button>

</form>
